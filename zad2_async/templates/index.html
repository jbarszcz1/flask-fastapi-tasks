<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 2 sync</title>
</head>
<body>

    {% if error %}
    <p style="color: red;"><strong>Error: {{ error }}</strong></p>
    {% endif %}

    {% if success %}
    <p style="color: green;"><strong>Success: {{ success }}</strong></p>
    {% endif %}

    <form action="/submit" method="POST">
        <div>
            <label>Name:</label>
            <input type="text" name="name" value="{{ old_name if old_name else '' }}" required>
        </div>
        <br>
        <div>
            <label>Surname:</label>
            <input type="text" name="surname" value="{{ old_surname if old_surname else '' }}" required>
        </div>
        <br>
        <button type="submit">Submit</button>
    </form>

    <hr>
    <h2>Saved Users List</h2>

    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>ID</th>
                <th>Name</th>
                <th>Surname</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.name }}</td>
                <td>{{ user.surname }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3">No users found in database.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
